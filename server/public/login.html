<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Phone Remote — Sign in</title>
<link rel="stylesheet" href="/shared.css"/>
<style>
  body { align-items: center; justify-content: center; overflow: auto; }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 380px;
    padding: 36px 32px;
    animation: .3s fadeUp;
  }
  .logo {
    width: 46px; height: 46px;
    border-radius: 13px;
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    margin-bottom: 18px;
    box-shadow: 0 4px 18px #6366f14a;
  }
  h1 { font-size: 22px; letter-spacing: -.4px; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 26px; }
  label { display: block; font-size: 11.5px; color: var(--muted); font-weight: 600; letter-spacing: .3px; margin: 14px 0 6px; text-transform: uppercase; }
  input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-size: 14px;
    padding: 11px 13px;
    outline: none;
    transition: border-color .18s var(--ease);
  }
  input:focus { border-color: var(--accent); }
  .submit {
    width: 100%;
    margin-top: 22px;
    padding: 12px;
    font-size: 14px;
    border-radius: 10px;
  }
  .switch { text-align: center; margin-top: 18px; font-size: 12.5px; color: var(--muted); }
  .switch a { color: var(--accent2); cursor: pointer; text-decoration: none; }
  .err {
    background: #ef444418;
    border: 1px solid #ef444444;
    border-radius: 9px;
    color: #fca5a5;
    font-size: 12.5px;
    margin-top: 16px;
    padding: 10px 13px;
    display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo"></div>
  <h1 id="title">Welcome back</h1>
  <div class="sub" id="sub">Sign in to control your phones</div>

  <form id="form">
    <label>Email</label>
    <input id="email" type="email" autocomplete="email" placeholder="you@example.com" required/>
    <label>Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required minlength="6"/>
    <div class="err" id="err"></div>
    <button class="btn primary submit" id="submit" type="submit">Sign in</button>
  </form>

  <div class="switch" id="switch">
    No account yet? <a onclick="setMode('register')">Create one</a>
  </div>
</div>

<script>
  // Already logged in → straight to the dashboard (or wherever we were headed)
  if (localStorage.getItem('pr_token')) {
    const next = new URLSearchParams(location.search).get('next');
    location.href = (next && next.startsWith('/')) ? next : '/dashboard';
  }

  let mode = 'login';

  function setMode(m) {
    mode = m;
    document.getElementById('title').textContent  = m === 'login' ? 'Welcome back' : 'Create account';
    document.getElementById('sub').textContent    = m === 'login' ? 'Sign in to control your phones' : 'One account for all your devices';
    document.getElementById('submit').textContent = m === 'login' ? 'Sign in' : 'Create account';
    document.getElementById('switch').innerHTML   = m === 'login'
      ? 'No account yet? <a onclick="setMode(\'register\')">Create one</a>'
      : 'Already have an account? <a onclick="setMode(\'login\')">Sign in</a>';
    document.getElementById('password').autocomplete = m === 'login' ? 'current-password' : 'new-password';
    showErr('');
  }

  function showErr(text) {
    const el = document.getElementById('err');
    el.textContent = text;
    el.style.display = text ? 'block' : 'none';
  }

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    showErr('');
    const btn = document.getElementById('submit');
    btn.disabled = true;
    btn.textContent = 'Please wait...';
    try {
      const res = await fetch('/api/' + mode, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Request failed');
      localStorage.setItem('pr_token', data.token);
      localStorage.setItem('pr_email', data.email);
      const next = new URLSearchParams(location.search).get('next');
      location.href = (next && next.startsWith('/')) ? next : '/dashboard';
    } catch (err) {
      showErr(err.message);
      btn.disabled = false;
      btn.textContent = mode === 'login' ? 'Sign in' : 'Create account';
    }
  });
</script>
</body>
</html>
