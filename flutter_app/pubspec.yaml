  device_info_plus: ^9.1.0
  shared_preferences: ^2.2.2
  geolocator: ^13.0.2
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
