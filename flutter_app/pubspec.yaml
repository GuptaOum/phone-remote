publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: ^1.0.0
  web_socket_channel: ^2.4.0
  file_picker: ^8.0.0
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  dio: ^5.4.0
  open_file: ^3.3.2
